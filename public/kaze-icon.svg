<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-4" y="-2" width="136" height="140" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>
  <!-- Rounded square with subtle shadow -->
  <rect x="4" y="4" width="120" height="120" rx="26" fill="#FAFAF9" filter="url(#shadow)"/>
  <rect x="4" y="4" width="120" height="120" rx="26" stroke="#E8E6E3" stroke-width="1"/>
  <!-- Wind lines -->
  <g stroke="#18181B" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Top line — curls up right -->
    <path d="M38 44 H72 A6 6 0 1 1 72 56 H38"/>
    <!-- Middle line — straight long -->
    <path d="M42 64 H82 A6 6 0 1 1 82 76"/>
    <!-- Bottom line — curls down right -->
    <path d="M38 84 H68 A6 6 0 1 0 68 72"/>
  </g>
</svg>
